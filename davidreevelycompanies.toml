# Ontario Courts Monitor — Companies Configuration
# Reporter: David Reevely
#
# Each [[companies]] block defines one company to monitor.
# A company can have multiple searches entries —
# useful when a company appears under several distinct legal names.
#
# search_type options:
#   "contains" — matches any party name containing the term (good for unique names)
#   "exact"    — matches only party names exactly equal to the term (good for common words)
#
# Tip: use "exact" whenever the search term is a common word or phrase
# that might appear inside unrelated party names.
# Use "contains" for distinctive names unlikely to appear inside other names.

[reporter]
name = "David Reevely"
email = "david.reevely@thelogic.co"

