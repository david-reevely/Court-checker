# Ontario Courts Monitor — Global Configuration
#
# This file controls email sending and court settings.
# Each reporter's company list and email address lives in their own
# *companies.toml file (e.g. davidreevelycompanies.toml).

[email]
smtp_host = "smtp.gmail.com"
smtp_port = 587
smtp_user = "david.reevely@thelogic.co"       # Gmail address used to send all digests
subject_prefix = "[Courts]"

# Email password is NOT stored here.
# Set the environment variable SMTP_PASS to your Gmail app password.
# In GitHub Actions, add it as a repository secret named SMTP_PASS.

[settings]
# Toronto — Superior Court of Justice, Civil and Small Claims Court
court_id = "68f021c4-6a44-4735-9a76-5360b2e8af13"
