name: Ontario Courts Monitor

on:
  schedule:
    # GitHub's shared scheduler often delays free-tier jobs by several hours,
    # so exact timing isn't possible. We fire early (09:00 UTC = 5 AM EDT /
    # 4 AM EST) so that even with a typical multi-hour delay the digest still
    # lands in the morning, Eastern time. Single cron = no duplicate runs.
    - cron: "0 9 * * 1-5"
  workflow_dispatch:  # allows manual runs from the Actions tab

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run monitor
        env:
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
        run: python monitor.py

      - name: Commit updated cache
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cache.json
          git diff --staged --quiet || git commit -m "Update courts cache [skip ci]"
          git pull --rebase origin main
          git push
